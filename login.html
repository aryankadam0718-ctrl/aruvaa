<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#87B9D4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ARUVA">
  <link rel="apple-touch-icon" href="/image.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARUVA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#87B9D4;--gold-l:#ACD1E5}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}

/* ── INTRO SCREEN ── */
#intro{
  position:fixed;inset:0;z-index:100;background:#000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transition:opacity .9s ease;
}
#intro.fade-out{opacity:0;pointer-events:none}
#particles-canvas{position:absolute;inset:0;z-index:0}

/* Cinema letterbox bars */
.bar{position:absolute;left:0;right:0;height:72px;background:#000;z-index:2;transition:transform 1.1s cubic-bezier(.25,.46,.45,.94)}
.bar-top{top:0}
.bar-bot{bottom:0}
.bar-top.open{transform:translateY(-100%)}
.bar-bot.open{transform:translateY(100%)}

/* Glow rings behind logo */
.ring{
  position:absolute;top:50%;left:50%;border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;border:1px solid rgba(135,185,212,.12);
}
.ring-1{width:260px;height:260px;animation:ringOut 2s ease 0.8s forwards}
.ring-2{width:380px;height:380px;animation:ringOut 2s ease 1.1s forwards}
.ring-3{width:500px;height:500px;animation:ringOut 2s ease 1.4s forwards}
@keyframes ringOut{
  0%{transform:translate(-50%,-50%) scale(.4);opacity:.7}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}

/* Brand center */
#brand-center{
  position:relative;z-index:3;
  display:flex;flex-direction:column;align-items:center;
}
#logo-area{position:relative;width:190px;height:156px;margin-bottom:12px}

/* Logo SVG animation */
#logo-wrap{
  width:100%;height:100%;
  opacity:0;
  animation:logoBloom 1.6s cubic-bezier(.16,1,.3,1) .6s forwards;
}
@keyframes logoBloom{
  0%  {opacity:0;transform:scale(.45) rotate(-8deg);filter:blur(18px) brightness(3)}
  30% {opacity:1;filter:blur(0) brightness(1.8);transform:scale(1.1) rotate(2deg)}
  65% {transform:scale(.97) rotate(0deg);filter:brightness(1.2)}
  100%{opacity:1;transform:scale(1) rotate(0deg);filter:drop-shadow(0 0 16px rgba(135,185,212,.5)) brightness(1)}
}
#logo-wrap.glow{animation:logoBloom 1.6s cubic-bezier(.16,1,.3,1) .6s forwards, glowPulse 3s ease-in-out 2.4s infinite}
@keyframes glowPulse{
  0%,100%{filter:drop-shadow(0 0 14px rgba(135,185,212,.4))}
  50%{filter:drop-shadow(0 0 36px rgba(135,185,212,.8)) drop-shadow(0 0 70px rgba(135,185,212,.3))}
}

/* Horizontal scan flash */
#scan{
  position:absolute;top:50%;left:-30%;width:160%;height:2px;opacity:0;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(135,185,212,.6) 40%,rgba(255,255,255,1) 50%,rgba(135,185,212,.6) 60%,transparent 100%);
  animation:scanFlash .55s ease-out 2.0s forwards;
}
@keyframes scanFlash{
  0%{opacity:1;transform:translateY(-60px) scaleX(.3)}
  70%{opacity:.8}
  100%{opacity:0;transform:translateY(60px) scaleX(1)}
}

/* Divider */
#divider{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:16px;animation:divGrow .7s ease 2.2s forwards}
@keyframes divGrow{to{width:200px}}

/* Brand name letters */
#brand-name{
  display:flex;letter-spacing:20px;text-indent:20px;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(56px,9vw,96px);
  color:#fff;
  margin-bottom:10px;
}
.bl{
  display:inline-block;opacity:0;transform:translateY(22px) scaleY(.7);
  animation:bLetterIn .5s cubic-bezier(.16,1,.3,1) calc(1.8s + var(--i)*.11s) forwards;
}
@keyframes bLetterIn{
  to{opacity:1;transform:translateY(0) scaleY(1)}
}

/* Tagline */
#brand-tag{
  font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--gold);
  opacity:0;animation:tagIn .9s ease 2.5s forwards;
}
@keyframes tagIn{to{opacity:1}}


/* ── LOGIN PAGE ── */
#login-page{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(135,185,212,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 10% 90%, rgba(135,185,212,.04) 0%,transparent 50%),
    #000;
  opacity:0;pointer-events:none;transition:opacity .8s ease;
}
#login-page.visible{opacity:1;pointer-events:all}
#login-page::before{
  content:'';position:absolute;inset:0;z-index:0;
  background-image:radial-gradient(rgba(135,185,212,.06) 1px,transparent 1px);
  background-size:42px 42px;
}

/* Card */
#lc{
  position:relative;z-index:1;width:100%;max-width:390px;margin:16px;
  padding:46px 40px 38px;
  background:rgba(255,255,255,.022);
  border:1px solid rgba(135,185,212,.2);
  border-radius:22px;
  backdrop-filter:blur(24px);
  box-shadow:0 0 100px rgba(0,0,0,.7),0 0 50px rgba(135,185,212,.08);
  animation:cardSlideIn .7s cubic-bezier(.16,1,.3,1);
}
@keyframes cardSlideIn{
  from{transform:translateY(32px) scale(.96);opacity:0}
  to{transform:none;opacity:1}
}

/* Card logo */
.lc-logo-svg{width:44px;height:36px;display:block;margin:0 auto 12px}

/* Card heading */
#lc-brand{
  font-family:'Bebas Neue',sans-serif;font-size:30px;
  letter-spacing:10px;text-indent:10px;text-align:center;
  background:linear-gradient(135deg,#87B9D4,#ACD1E5,#87B9D4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
#lc-sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;text-align:center;margin-bottom:32px}

/* Fields */
.fg{margin-bottom:18px}
.fl{display:block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:7px}
.fi{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:11px;
  padding:12px 15px;color:#fff;font-size:14px;outline:none;
  transition:border-color .2s,background .2s;
}
.fi:focus{border-color:rgba(135,185,212,.6);background:rgba(135,185,212,.04)}
.fi::placeholder{color:rgba(255,255,255,.2)}

/* Row */
.fr{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}
.fck{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.35);cursor:pointer}
.fck input{accent-color:var(--gold);cursor:pointer}
.fgt{font-size:11px;color:rgba(135,185,212,.55);text-decoration:none;transition:color .2s}
.fgt:hover{color:var(--gold)}

/* Buttons */
.btn-main{
  width:100%;background:linear-gradient(135deg,#87B9D4,#ACD1E5);
  color:#000;border:none;padding:14px;border-radius:50px;
  font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all .3s;margin-bottom:14px;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(135,185,212,.42)}
.btn-main:active{transform:translateY(0)}
.btn-ghost{
  width:100%;background:transparent;
  color:rgba(255,255,255,.45);
  border:1px solid rgba(255,255,255,.1);padding:12px;border-radius:50px;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;margin-bottom:0;
}
.btn-ghost:hover{border-color:rgba(135,185,212,.4);color:var(--gold)}

/* Or divider */
.for{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.for::before,.for::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
.for span{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:2px}

/* Footer */
#lcf{text-align:center;font-size:11px;color:rgba(255,255,255,.28);margin-top:20px}
#lcf a{color:var(--gold);text-decoration:none;font-weight:600;transition:color .2s}
#lcf a:hover{color:var(--gold-l)}
</style>
</head>
<body>

<!-- ════════════ INTRO ANIMATION ════════════ -->
<div id="intro">
  <canvas id="particles-canvas"></canvas>

  <!-- Letterbox bars -->
  <div class="bar bar-top" id="bar-top"></div>
  <div class="bar bar-bot" id="bar-bot"></div>

  <!-- Expanding rings -->
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div id="brand-center">
    <div id="logo-area">
      <div id="logo-wrap" class="glow">
        <img src="image.png" style="width:100%;height:100%;object-fit:contain;filter:invert(1) sepia(1) saturate(2) hue-rotate(165deg) brightness(1.1);">
      </div>
      <div id="scan"></div>
    </div>

    <div id="divider"></div>

    <div id="brand-name">
      <span class="bl" style="--i:0">A</span><span class="bl" style="--i:1">R</span><span class="bl" style="--i:2">U</span><span class="bl" style="--i:3">V</span><span class="bl" style="--i:4">A</span>
    </div>

    <div id="brand-tag">Design Your Story</div>
  </div>
</div>

<!-- ════════════ LOGIN PAGE ════════════ -->
<div id="login-page">
  <div id="lc">

    <!-- Mini logo -->
    <img src="image.png" class="lc-logo-svg" style="object-fit:contain;filter:invert(1) sepia(1) saturate(2) hue-rotate(165deg) brightness(1.1);">
    <svg style="display:none">
    </svg>

    <div id="lc-brand">ARUVA</div>
    <div id="lc-sub">Welcome back</div>

    <!-- Tab switcher -->
    <div id="auth-tabs" style="display:flex;gap:0;margin-bottom:24px;background:rgba(255,255,255,.05);border-radius:50px;padding:3px">
      <button id="tab-login" onclick="switchTab('login')" style="flex:1;padding:8px 18px;border:none;border-radius:50px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .25s;background:linear-gradient(135deg,#87B9D4,#ACD1E5);color:#0B1622;font-weight:700">Sign In</button>
      <button id="tab-register" onclick="switchTab('register')" style="flex:1;padding:8px 18px;border:none;border-radius:50px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .25s;background:transparent;color:rgba(255,255,255,.4);font-weight:600">Register</button>
    </div>

    <!-- Error message -->
    <div id="auth-err" style="display:none;background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.25);color:#ff9090;font-size:12px;padding:10px 14px;border-radius:10px;margin-bottom:16px;text-align:center"></div>

    <!-- LOGIN FORM -->
    <form id="lf" onsubmit="doLogin(event)" autocomplete="off">
      <div class="fg">
        <label class="fl">Email</label>
        <input class="fi" id="f-email" type="email" placeholder="your@email.com" required>
      </div>
      <div class="fg">
        <label class="fl">Password</label>
        <div style="position:relative">
          <input class="fi" type="password" id="f-pass" placeholder="••••••••" required style="padding-right:44px">
          <button type="button" onclick="togglePass('f-pass',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);font-size:16px;line-height:1;padding:4px;transition:color .2s" title="Show password">👁</button>
        </div>
      </div>
      <button class="btn-main" type="submit" id="sign-btn">Sign In →</button>
      <div class="for"><span>OR</span></div>
      <button class="btn-ghost" type="button" onclick="enterApp()">Continue as Guest</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="rf" onsubmit="doRegister(event)" autocomplete="off" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg"><label class="fl">First Name</label><input class="fi" id="r-fname" type="text" placeholder="Aryan" required></div>
        <div class="fg"><label class="fl">Last Name</label><input class="fi" id="r-lname" type="text" placeholder="Kadam"></div>
      </div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="r-email" type="email" placeholder="your@email.com" required></div>
      <div class="fg"><label class="fl">Password</label><div style="position:relative"><input class="fi" id="r-pass" type="password" placeholder="Min 8 characters" required minlength="8" style="padding-right:44px"><button type="button" onclick="togglePass('r-pass',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);font-size:16px;line-height:1;padding:4px;transition:color .2s">👁</button></div></div>
      <button class="btn-main" type="submit" id="reg-btn">Create Account →</button>
    </form>

    <div id="lcf" style="font-size:11px;color:rgba(255,255,255,.25);margin-top:16px;text-align:center">© 2026 ARUVA Fashion</div>
  </div>
</div>

<script>
// ── FLOATING PARTICLES ────────────────────────────────
(function(){
  const cvs = document.getElementById('particles-canvas');
  const ctx = cvs.getContext('2d');
  let W, H, alive = true;
  const pts = [];

  function resize(){ W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  for(let i=0;i<60;i++) pts.push({
    x: Math.random(), y: Math.random(),
    vx: (Math.random()-.5)*.0003,
    vy: -(Math.random()*.0006+.0002),
    r: Math.random()*1.8+.5,
    phase: Math.random()*Math.PI*2
  });

  let t=0;
  function draw(){
    if(!alive)return;
    requestAnimationFrame(draw);
    ctx.clearRect(0,0,W,H);
    t+=.012;
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.y<-.02)p.y=1.02;
      if(p.x<-.02)p.x=1.02; if(p.x>1.02)p.x=-.02;
      const a = .08+.14*Math.sin(t+p.phase);
      ctx.beginPath();
      ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2); 
      ctx.fillStyle=`rgba(135,185,212,${a})`;
      ctx.fill();
    });
  }
  draw();
  window._killParts=()=>{ alive=false; ctx.clearRect(0,0,W,H); };
})();

// ── ANIMATION SEQUENCE ────────────────────────────────
setTimeout(()=>{ document.getElementById('bar-top').classList.add('open'); document.getElementById('bar-bot').classList.add('open'); }, 200);
setTimeout(()=>{ document.getElementById('intro').classList.add('fade-out'); }, 4400);
setTimeout(()=>{ document.getElementById('login-page').classList.add('visible'); window._killParts&&window._killParts(); }, 5000);

// ── TAB SWITCH ────────────────────────────────────────
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('lf').style.display  = isLogin ? '' : 'none';
  document.getElementById('rf').style.display  = isLogin ? 'none' : '';
  document.getElementById('lc-sub').textContent = isLogin ? 'Welcome back' : 'Create your account';
  const tl = document.getElementById('tab-login'), tr = document.getElementById('tab-register');
  const on = 'background:linear-gradient(135deg,#87B9D4,#ACD1E5);color:#0B1622;font-weight:700';
  const off = 'background:transparent;color:rgba(255,255,255,.4);font-weight:600';
  tl.style.cssText = tl.style.cssText.replace(/background[^;]+;color[^;]+;font-weight[^;]+/, isLogin ? on : off);
  tr.style.cssText = tr.style.cssText.replace(/background[^;]+;color[^;]+;font-weight[^;]+/, isLogin ? off : on);
  document.getElementById('auth-err').style.display = 'none';
}
function showErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg; el.style.display = 'block';
}

// ── LOGIN ─────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('f-email').value.trim();
  const pass  = document.getElementById('f-pass').value;
  const btn   = document.getElementById('sign-btn');
  if (!email || !pass) { showErr('Enter email and password'); return; }
  btn.textContent = 'Signing in…'; btn.disabled = true; btn.style.opacity = '.65';
  document.getElementById('auth-err').style.display = 'none';
  try {
    const res  = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, password: pass }) });
    const data = await res.json();
    if (!res.ok) throw data;
    localStorage.setItem('aruva_token', data.token);
    localStorage.setItem('aruva_user',  JSON.stringify(data.user));
    window.location.href = data.user.is_admin ? 'admin.html' : 'home.html';
  } catch(err) {
    showErr(err.error || 'Login failed. Check your credentials.');
    btn.textContent = 'Sign In →'; btn.disabled = false; btn.style.opacity = '1';
  }
}

// ── REGISTER ──────────────────────────────────────────
async function doRegister(e) {
  e.preventDefault();
  const first_name = document.getElementById('r-fname').value.trim();
  const last_name  = document.getElementById('r-lname').value.trim();
  const email      = document.getElementById('r-email').value.trim();
  const password   = document.getElementById('r-pass').value;
  const btn        = document.getElementById('reg-btn');
  btn.textContent = 'Creating…'; btn.disabled = true; btn.style.opacity = '.65';
  document.getElementById('auth-err').style.display = 'none';
  try {
    const res  = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, password, first_name, last_name }) });
    const data = await res.json();
    if (!res.ok) throw data;
    localStorage.setItem('aruva_token', data.token);
    localStorage.setItem('aruva_user',  JSON.stringify(data.user));
    window.location.href = 'home.html';
  } catch(err) {
    showErr(err.error || 'Registration failed.');
    btn.textContent = 'Create Account →'; btn.disabled = false; btn.style.opacity = '1';
  }
}

function enterApp() { window.location.href = 'home.html'; }

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.style.color = show ? 'rgba(135,185,212,.8)' : 'rgba(255,255,255,.35)';
}

// Remove white background from logo PNG
(function(){
  const tmp = new Image();
  tmp.crossOrigin = 'anonymous';
  tmp.src = 'image.png'; 
  tmp.onload = function(){
    const c = document.createElement('canvas');
    c.width = tmp.width; c.height = tmp.height;
    const ctx = c.getContext('2d');
    ctx.drawImage(tmp, 0, 0);
    const d = ctx.getImageData(0, 0, c.width, c.height);
    for(let i = 0; i < d.data.length; i += 4){
      if(d.data[i] > 200 && d.data[i+1] > 200 && d.data[i+2] > 200)
        d.data[i+3] = 0;
    }
    ctx.putImageData(d, 0, 0);
    const url = c.toDataURL('image/png');
    document.querySelectorAll('img[src="image.png"]').forEach(el => el.src = url);
  };
})();
</script>
<script src="js/animations.js" defer></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}</script>
</body>
</html>
